<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Unified Workspace...</title>
    <script>
        const params = new URLSearchParams(window.location.search);
        const convId = params.get('conv');
        const withUser = params.get('with');
        if (convId && withUser) {
            window.location.href = `inbox.html?conv=${convId}&with=${encodeURIComponent(withUser)}`;
        } else {
            window.location.href = 'inbox.html';
        }
    </script>
</head>
<body>
    <div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background: #f1f5f9; color: #475569; text-align: center; padding: 20px;">
        <div>
            <div style="font-size: 24px; margin-bottom: 8px;">✨</div>
            <p style="font-weight: 500;">Redirecting to unified workspace...</p>
        </div>
    </div>
</body>
</html>
